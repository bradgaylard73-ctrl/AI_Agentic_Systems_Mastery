name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
          AA_OFFLINE: "1"
        run: |
          pytest -q
      - name: Dev-set evaluation gate
        env:
          PYTHONPATH: .
          AA_OFFLINE: "1"
        run: |
          python -m src.avatar_assistant.evaluate_batch data/dataset/dev dev_report.json 0.40
