id: dpif_white_paper
title: "Digital Presence Integrity Framework (DPIF) White Paper"
category: governance_framework
version: 1.3
description: >
  The DPIF is a governance standard for AI-mediated representations of real
  people. It defines controls to preserve Presence Integrity — ensuring digital
  representations remain faithful to identity, bounded by consent, anchored to
  accountable authorship, and subject to enforceable containment. Covers control
  architecture (12 CPCs, 4 SPCs), context risk classification, deployment
  lifecycle, inter-deployment conflicts, and posthumous governance.
